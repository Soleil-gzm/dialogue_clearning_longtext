# configs/config_bucket_turn1.yaml
dataset_path: __INPUT_FILE__
export_path: __OUTPUT_FILE__
text_keys: user_input
np: 16
skip_op_error: true
open_tracer: true
trace_num: 1000

process:
  - whitespace_normalization_mapper:
  - text_length_filter:
      min_len: 150
      max_len: 250
  - language_id_score_filter:
      lang: zh
      min_score: 0.9
  - document_deduplicator:
      lowercase: true
      ignore_non_character: true

   #使用 MinHash 算法识别语义相似的文本
  - document_minhash_deduplicator:                          # deduplicate text samples using MinHash-LSH method
      tokenization: character                                     # tokenization method for text. One of [space, punctuation, character, sentencepiece]
      window_size: 3                                          # window size of shingling
      num_permutations: 64                                   # number of permutations in minhash computing
      jaccard_threshold: 0.5                              # the min jaccard similarity threshold in near-duplicate detection. When the jaccard similarity of two sample texts is >= this threshold, they are regarded as similar samples and this op will only keep one of them after deduplication
      lowercase: true                                         # whether to convert text to lower case
      num_bands: null                                         # number of bands in LSH. Default it's None, and it will be determined by an optimal params computation algorithm by minimize the weighted sum of probs of False Positives and False Negatives
      num_rows_per_band: null                                 # number of rows in each band in LSH. Default it's None, and it will be determined by an optimal params computation algorithm

    #删除单条数据内部重复的句子
  - remove_repeat_sentences_mapper:                         # remove repeat sentences in text samples.
     lowercase: True                                        # whether to convert sample text to lower case
     ignore_special_character: true                          # whether to ignore special characters when judging repeated sentences. Special characters are all characters except Chinese characters, letters and numbers
     min_repeat_sentence_length: 2                           # sentences shorter than this length will not be deduplicated. If ignore_special_character is set to True, then special characters are not included in this length                       # remove characters specified by users
  
  #比 MinHash 更快但精度稍低
  - document_simhash_deduplicator:                          # deduplicate text samples using SimHash-LSH method
      tokenization: character                                 # tokenization method for text. One of [space, punctuation, character]
      window_size: 7                                         # window size of shingling
      num_blocks: 5                                          # number of blocks in SimHash computing
      hamming_distance: 3                                    # the max hamming distance to regard 2 samples as similar enough pair. Should be less than num_blocks always
      lowercase: True                                        # whether to convert text to lower case                                    


  # 过滤包含分期关键词的用户输入
  - flagged_words_filter:
      lang: zh
      max_ratio: 0
      flagged_words_dir: ./configs/installment_keywords.txt
      use_words_aug: true
      text_key: user_input
      
  # 可选：过滤包含分期关键词的助手回复
  - flagged_words_filter:
      lang: zh
      max_ratio: 0
      flagged_words_dir: ./configs/installment_keywords.txt
      use_words_aug: true
      text_key: target_output